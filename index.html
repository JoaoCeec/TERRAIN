<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Procedural Terrain Explorer</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
image-rendering:pixelated;
font-family:monospace;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:8px;
}
</style>
</head>

<body>

<div id="ui">
Click to start<br>
WASD move<br>
Mouse look<br>
Space jump
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>

let scene=new THREE.Scene()
scene.fog=new THREE.Fog(0x000000,10,20)

let camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000)

let renderer=new THREE.WebGLRenderer({antialias:false})
renderer.setSize(innerWidth,innerHeight)
renderer.setPixelRatio(0.5)
document.body.appendChild(renderer.domElement)

let light=new THREE.DirectionalLight(0xffffff,2)
light.position.set(1,2,1)
scene.add(light)

scene.add(new THREE.AmbientLight(0x888888))

/* movement */

let speed=0.15
let keys={}
let yaw=0
let pitch=0

let velocityY=0
let gravity=0.01
let playerHeight=1.7
let grounded=false

document.addEventListener("keydown",e=>keys[e.code]=true)
document.addEventListener("keyup",e=>keys[e.code]=false)

document.body.onclick=()=>document.body.requestPointerLock()

document.addEventListener("mousemove",e=>{
if(document.pointerLockElement===document.body){

yaw-=e.movementX*0.002
pitch-=e.movementY*0.002

pitch=Math.max(-Math.PI/2,Math.min(Math.PI/2,pitch))

}
})

/* noise */

function noise(x,z){
return (Math.sin(x*0.15)+Math.cos(z*0.15))*2
}

/* terrain chunks */

let chunks={}
let size=20

function generateChunk(cx,cz){

let id=cx+","+cz
if(chunks[id])return

let geo=new THREE.PlaneGeometry(size,size,16,16)
geo.rotateX(-Math.PI/2)

let pos=geo.attributes.position

for(let i=0;i<pos.count;i++){

let x=pos.getX(i)+cx*size
let z=pos.getZ(i)+cz*size

let y=noise(x,z)

pos.setY(i,y)

}

geo.computeVertexNormals()

let mat=new THREE.MeshStandardMaterial({
color:0x55aa55,
flatShading:true
})

let mesh=new THREE.Mesh(geo,mat)
mesh.position.set(cx*size,0,cz*size)

scene.add(mesh)

chunks[id]=mesh
}

function updateChunks(){

let cx=Math.floor(camera.position.x/size)
let cz=Math.floor(camera.position.z/size)

for(let x=-3;x<=3;x++)
for(let z=-3;z<=3;z++)
generateChunk(cx+x,cz+z)

}

/* ground height */

function groundHeight(x,z){
return noise(x,z)
}

/* movement */

function updateMovement(){

let forward=new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw))
let right=new THREE.Vector3(forward.z,0,-forward.x)

/* W and S inverted */

if(keys["KeyW"]) camera.position.addScaledVector(forward,-speed)
if(keys["KeyS"]) camera.position.addScaledVector(forward,speed)
if(keys["KeyA"]) camera.position.addScaledVector(right,-speed)
if(keys["KeyD"]) camera.position.addScaledVector(right,speed)

/* gravity */

velocityY-=gravity
camera.position.y+=velocityY

let ground=groundHeight(camera.position.x,camera.position.z)+playerHeight

if(camera.position.y<ground){

camera.position.y=ground
velocityY=0
grounded=true

}else{
grounded=false
}

/* jump */

if(keys["Space"] && grounded){
velocityY=0.25
grounded=false
}

}

/* start position */

camera.position.set(0,5,0)

/* loop */

function loop(){

requestAnimationFrame(loop)

updateMovement()
updateChunks()

camera.rotation.order="YXZ"
camera.rotation.y=yaw
camera.rotation.x=pitch

renderer.render(scene,camera)

}

loop()

onresize=()=>{
camera.aspect=innerWidth/innerHeight
camera.updateProjectionMatrix()
renderer.setSize(innerWidth,innerHeight)
}

</script>

</body>
</html>
